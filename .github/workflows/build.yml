name: build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install py2app pywebview

      - name: Build .app Bundle
        run: |
          python3 setup.py py2app --dist-dir dist

      - name: Package
        run: |
          cd dist && zip -r ../VinciRamp-macOS.zip VinciRamp.app

      - uses: actions/upload-artifact@v4
        with:
          name: VinciRamp-macOS
          path: VinciRamp-macOS.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: VinciRamp-macOS

      - name: Generate Tag
        id: tag
        run: |
          TAG="build-$(date -u +%Y%m%d-%H%M%S)-${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Build ${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}

            ## Install
            - Download `VinciRamp-macOS.zip`
            - Unzip and move `VinciRamp.app` to your Applications folder
            - Requires DaVinci Resolve Studio (for Fusion scripting)
            - Install pywebview: `pip3 install pywebview`
            - Run install.sh to auto-remove quarantine, or right-click → Open for the first manual launch
            - If it doesn't open, run from Terminal to see errors:
              `/Applications/VinciRamp.app/Contents/MacOS/VinciRamp`
            - Crash logs written to: `~/Library/Logs/VinciRamp/crash.log`
          files: VinciRamp-macOS.zip
          generate_release_notes: false
